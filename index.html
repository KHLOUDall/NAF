<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAF - Elegant Promo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #F9EFDB; /* اللون الجديد */
            z-index: 10;
            width: 100%;
        }

        #countdown, #message {
            font-size: 100px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(249, 239, 219, 0.5);
            display: block;
            margin: 0;
            padding: 0;
        }

        /* أنيميشن الكلمات العادية */
        .fade-in-out {
            animation: fadeInOut 3s forwards;
        }

        /* أنيميشن الكود النهائي الثابت */
        .stay-forever {
            animation: finalAppear 1.5s forwards;
            color: #F9EFDB; 
            text-shadow: 0 0 30px rgba(249, 239, 219, 0.7);
            border: 2px solid #F9EFDB;
            padding: 20px 40px;
            display: inline-block;
            margin-top: 20px;
            border-radius: 10px;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes finalAppear {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        #promo-label {
            font-size: 30px;
            margin-bottom: 10px;
            display: block;
            color: #F9EFDB;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    
    <div id="overlay">
        <div id="countdown"></div>
        <div id="message"></div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // لون الحروف في الخلفية أصبح بنفس درجة اللون الجديد ولكن بشفافية
            ctx.fillStyle = "rgba(249, 239, 219, 0.35)"; 
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        const countdownElement = document.getElementById('countdown');
        const messageElement = document.getElementById('message');
        
        const words = ["HAPPY", "BIRTHDAY", "TO", "NAF", "❤"];
        const promoCode = "naf3000";
        let index = 0;
        let count = 3;

        function startSequence() {
            const timer = setInterval(() => {
                if (count > 0) {
                    countdownElement.innerText = count;
                    count--;
                } else {
                    clearInterval(timer);
                    countdownElement.innerText = "";
                    showNextWord();
                }
            }, 1000);
        }

        function showNextWord() {
            if (index < words.length) {
                messageElement.innerText = words[index];
                messageElement.classList.remove('fade-in-out');
                void messageElement.offsetWidth; 
                messageElement.classList.add('fade-in-out');
                
                index++;
                setTimeout(showNextWord, 3000); 
            } else {
                showFinalCode();
            }
        }

        function showFinalCode() {
            messageElement.classList.remove('fade-in-out');
            messageElement.innerHTML = `
                <span id="promo-label">:استخدم الكود عند المحاسب</span>
                <div class="stay-forever">${promoCode}</div>
            `;
        }

        setInterval(drawMatrix, 35);
        startSequence();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
